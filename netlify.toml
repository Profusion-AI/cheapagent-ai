[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

# Hosted Context API namespace. The edge function intercepts /v1/* on every host
# the site serves (apex today, api.cheapagent.ai once the alias + SSL land) and
# answers the pre-gate 401/501 stub, so /v1/* never falls through to the SPA.
# See netlify/edge-functions/api-v1.mjs and docs/deployment-topology.md.
[[edge_functions]]
  path = "/v1/*"
  function = "api-v1"

[context.branch-deploy.environment]
  VITE_CHEAPAGENT_ENV = "staging"
  VITE_CHEAPAGENT_NOINDEX = "true"

[context.deploy-preview.environment]
  VITE_CHEAPAGENT_ENV = "staging"
  VITE_CHEAPAGENT_NOINDEX = "true"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
